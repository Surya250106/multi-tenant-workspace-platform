global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "backend"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["backend:8080"]

  - job_name: "postgres"
    metrics_path: "/metrics/postgres"
    static_configs:
      - targets: ["backend:8080"]

  - job_name: "redis"
    metrics_path: "/metrics/redis"
    static_configs:
      - targets: ["backend:8080"]
