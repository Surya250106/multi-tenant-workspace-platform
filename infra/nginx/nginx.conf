user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format json_analytics '{"timestamp":"$time_local",'
                              '"client_ip":"$remote_addr",'
                              '"request":"$request",'
                              '"status":$status,'
                              '"bytes_sent":$body_bytes_sent,'
                              '"referer":"$http_referer",'
                              '"user_agent":"$http_user_agent",'
                              '"upstream_connect_time":"$upstream_connect_time",'
                              '"request_time":"$request_time"}';

    access_log /var/log/nginx/access.log json_analytics;

    sendfile on;
    keepalive_timeout 65;

    # Gzip settings for fast static loading
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Upstream declarations
    upstream frontend_svc {
        server frontend:3000;
    }

    upstream backend_svc {
        server backend:8080;
    }

    server {
        listen 80;
        server_name localhost;

        # Static Client / Frontend Ingress Routing
        location / {
            proxy_pass http://frontend_svc;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Express.js REST API Ingress Routing
        location /api/ {
            proxy_pass http://backend:8080;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Prometheus metrics endpoint forwarding
        location /metrics {
            proxy_pass http://backend:8080/metrics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Real-time WebSocket Upgrades forwarding
        location /socket/ {
            proxy_pass http://backend:8080/socket/;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400; # keep alive WebSocket connections
        }
    }
}
